name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp -R -L \
            index.html \
            404.html \
            tools.html \
            assets \
            3rdpartylicenses.txt \
            runtime.9ad22a88fcc70a015907.js \
            polyfills-es5.c42faceff056e44efb01.js \
            polyfills.37fe6bc1076ff226ed27.js \
            vendor.c8b120cf1dd9dd7a4cfb.js \
            main.b37bc2773da84184528a.js \
            styles.3760f84d758f964b33a4.css \
            _site/
          touch _site/.nojekyll
          test -f _site/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
